<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>何切る問題ビューア</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewer">
    <div id="image-container">
      <img id="current-image" src="" alt="問題画像">
    </div>
    <div id="indicator">
      <button id="skip-prev-btn" class="skip-btn">-10</button>
      <span id="question-number">Q1</span>
      <span id="page-type">問題</span>
      <span id="progress">1 / 5</span>
      <button id="skip-next-btn" class="skip-btn">+10</button>
    </div>
  </div>
  <script src="viewer.js"></script>
</body>
</html>
